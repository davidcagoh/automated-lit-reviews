# ── Extraction: project-specific fields ──────────────────────────────────────

[[extraction.extra_fields]]
name = "hci_venue"
description = "Whether the paper was published in a core HCI/HRI venue (CHI, HRI, THRI, UIST, CSCW, RO-MAN). Return true/false."

[[extraction.extra_fields]]
name = "paradigm"
description = "Which of the three evolutionary paradigms this paper primarily belongs to: 'strict_grounding' (early NLP/keyword/G³-era), 'situated_multimodal' (context-aware, repair, LLM-era HRI), or 'vlm_vla' (modern vision-language models/action models). Return the closest fit."

[[extraction.extra_fields]]
name = "human_eval_metrics"
description = "List of human-centered evaluation metrics reported (e.g. 'NASA-TLX', 'task completion rate', 'trust survey', 'cognitive load rating', 'interaction repair count'). Return as a list, or empty list if no user study."

[[extraction.extra_fields]]
name = "hci_finding"
description = "The single most important human-centered finding or implication, framed in terms of usability trade-offs (e.g. 'high predictability but severe cognitive load due to vocabulary mismatch'). One sentence."
