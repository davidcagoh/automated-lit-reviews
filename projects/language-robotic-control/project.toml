[project]
name = "language-robotic-control"

[seeds]
identifiers = [
    "10.1609/aaai.v25i1.7979",    # Tellex et al. — Natural Language Grounding (G³)
    "10.1016/j.csl.2021.101255",  # Spoken Language Research Directions
    "10.48550/arXiv.2503.07547",  # LLM integration in robotics
    "10.48550/arXiv.2507.22933",  # VLM Review
    "10.1145/3777552",            # Reporting and trust (Matuszek et al.)
    "10.48550/arXiv.2507.10672",  # VLA review
]

[criteria]
v1 = """
Include if the paper addresses language-based or speech-based interaction with robots and meets at least one of:
- Discusses human-centered evaluation: cognitive load, task completion time, trust, system legibility, interaction repair, mental models, physical safety, NASA-TLX scores, or user studies
- Published in an HCI or HRI venue (ACM CHI, ACM/IEEE HRI, ACM THRI, UIST, CSCW, RO-MAN) on natural language, speech, or multimodal human-robot interaction
- A technical paper (AAAI, ICRA, IROS, NeurIPS, etc.) whose language/speech architecture has documentable implications for user experience, cognitive burden, or interaction design in human-robot settings — even if the human-factors impact is implicit
- Addresses LLM, VLM, or VLA integration in robotics where evaluation includes human subjects, trust, legibility, or interaction design considerations
- Multimodal HRI combining language with gaze, gesture, pointing, or social cues to reduce interaction friction or resolve ambiguity
- Conversational repair, ambiguity resolution, or failure recovery in language-guided robotic systems
- Safety, transparency, or trust frameworks for language-commanded or autonomous robots

Exclude if:
- Pure ML/NLP benchmark with no robotic application and no human-factors component
- Robot perception, mapping, or navigation paper with no language interface and no HCI evaluation
- Language grounding paper focused purely on computational accuracy (e.g., referring expression datasets) with no user study or HCI framing
- Dialogue systems or chatbots not connected to robotic control or physical human-robot interaction
- Industrial automation with no human operators or HCI perspective
- General NLP or computer vision survey with no HRI connection
"""

# v2: tightened "implicit HCI implications" clause (too liberal in v1 — models disagreed).
# Removed "even if the human-factors impact is implicit"; added explicit excludes for
