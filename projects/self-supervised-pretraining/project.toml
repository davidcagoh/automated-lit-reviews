# ── Extraction: project-specific fields ──────────────────────────────────────

[[extraction.extra_fields]]
name = "ssl_objective"
description = "The self-supervised learning objective used (e.g. 'masked reconstruction', 'self-distillation/DINO', 'contrastive', 'predictive coding', 'multi-view consistency'). Null if not an SSL paper."

[[extraction.extra_fields]]
name = "audio_modality"
description = "The audio modality studied: 'environmental sound', 'speech', 'music', 'general audio', or a combination. Null if vision-only."

[[extraction.extra_fields]]
name = "data_scale"
description = "Approximate scale of the unlabelled pre-training corpus used (e.g. '5k clips', 'AudioSet 2M clips', '60k hours LibriLight'). Null if not applicable."

[[extraction.extra_fields]]
name = "evaluation_protocol"
description = "How representation quality is evaluated: e.g. 'linear probing', 'KNN', 'fine-tuning', 'zero-shot'. Return as a list."

[[extraction.extra_fields]]
name = "key_finding"
description = "The single most important empirical finding or contribution, in one sentence."
